<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Analyzer</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f3faf6;
            font-family: 'Poppins', sans-serif;
        }

        /* Top heading */
        h1 {
            margin: 20px;
        }

        /* Center form */
        form {
            display: flex;
            justify-content: center;
        }

        /* Card */
        .container {
            width: 90%;
            max-width: 800px;
            background: #ffffff;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.15);
        }

        /* Text alignment */
        h2,
        p {
            text-align: left;
            margin: 10px 0;
        }

        /* Inputs */
        textarea,
        input {
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        /* Button */
        button {
            width: 20%;
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            background: rgb(38, 28, 28);
            ;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        /* button:hover {
    background: #1d4ed8;
} */

        #box {
            border: none;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 15px 20px;
            width: fit-content;
            margin-left: auto;
        }

        .nav-btn {
            padding: 12px 20px;
            background: rgb(38, 28, 28);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }


        #result {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        .result-card {
            background: white;
            width: 75%;
            max-width: 900px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.12);
            line-height: 1.9;
            font-size: 17px;
            overflow-wrap: break-word;
        }

        .result-card h2 {
            margin-top: 0;
        }

        .result-card h3 {
            margin-top: 25px;
            color: #222;
        }

        /* downloadpdf */
        @media print {

            .container,
            .header,
            .top-bar,
            #pdfBtn,
            #analyzeBtn {
                display: none;
            }

            #result {
                margin-top: 0;
            }

            .result-card {
                width: 100%;
                box-shadow: none;
                padding: 0;
            }
        }

        /* dark mode */
.dark{
    background:#121212 !important;
    color:white;
}

.dark .header h1{
    color:white;
}

.dark .result-card h3{
    color:white;
}

.dark #box{
    background:#2c2c2c;
    color:white;
}
       .dark .container{
    background:#1e1e1e;
    color:white;
}

.dark .result-card{
    background:#1e1e1e;
    color:white;
}

.dark textarea,
.dark input{
    background:#2c2c2c;
    color:white;
    border:1px solid #555;
}

.dark h1,
.dark h2,
.dark p,
.dark label{
    color:white;
}

.dark .nav-btn{
    background:#00ffcc;
    color:black;
}

.dark button{
    background:#00ffcc;
    color:black;
}
    </style>
</head>

<body>

    <div class="header">
        <h1>Welcome,</h1>


        <div class="top-bar">
            <a href="History.html" class="nav-btn">History</a>
            <a href="#" class="nav-btn" onclick="logout()">Logout</a>
        </div>

    </div>




    <form>
        <div class="container">

            <h2>Resume Analyzer</h2>

            <!-- <textarea placeholder="Paste your resume (optional)" rows="8" class="" class="text"></textarea> -->
            <textarea placeholder="Paste your resume (optional)" rows="8" class="text"></textarea>

            <p>OR upload file:</p>

            <input type="file" id="box">

            <input type="text" placeholder="What do you want to become? (e.g Software Engineer)" class="box1">

            <button type="submit" id="analyzeBtn">Analyze</button>

        </div>
    </form>

    <div id="result">

    </div>


    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark");
        }
    </script>

</body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script>

    const supabaseClient = window.supabase.createClient(
        "https://hhtbahmaencprbwkukrq.supabase.co",             //this is url address of our supabase 
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhodGJhaG1hZW5jcHJid2t1a3JxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NzI5ODYsImV4cCI6MjA5MzU0ODk4Nn0.VNLkdD4RCFDPJ50PeedXaVw_gFF33KnDdJL_-O2fAVM"        //It is safe to use in frontend with proper RLS policies enabled.
    );

    document.querySelector("form").addEventListener("submit", async (e) => {
        e.preventDefault();


        const text = document.querySelector(".text").value;
        const file = document.getElementById("box").files[0];
        const goal = document.querySelector(".box1").value;


        if (!text && !file) {
            alert("Please paste resume OR upload file ");
            return;
        }

        //  textarea case
        if (text) {
            analyze(text, goal);
        }

        //  file case
        // else if (file) {
        //     const reader = new FileReader();      //fileread he ek function ahe browser madhele te file read karate

        //     reader.onload = function () {
        //         analyze(reader.result, goal);
        //     };

        //     reader.readAsText(file);  // file la text madhe conver karato he ek methond ahe
        // }
        else if (file) {

            analyze(file, goal);

        }

    });




    async function analyze(resume, goal) {

        const button = document.getElementById("analyzeBtn");

        button.disabled = true;

        button.innerText =
            "Analyzing...";


        const formData = new FormData();

        formData.append("goal", goal);

        if (resume instanceof File) {

            formData.append("resume", resume);

        }

        else {

            formData.append("resume", resume);

        }

        const response = await fetch(
            "http://127.0.0.1:3000/analyze",
            {

                method: "POST",

                body: formData

            }
        );



        const data1 = await response.json();

        const result = data1.message;



        // const user = await supabaseClient.auth.getUser();

        const user = await supabaseClient.auth.getUser();

        const data = {
            user_id: user.data.user.id,
            resume: typeof resume === "string"
                ? resume
                : resume.name,
            goal: goal,
            result: result
        };



        await supabaseClient.from("resume_history").insert([data]);

        button.disabled = false;

        button.innerText = "Analyze";


        document.getElementById("result").innerHTML = `
            <div class="result-card">

    <h2>Result</h2>
               <button id="pdfBtn" onclick="printReport()">Download PDF</button>
    <div id="aiResult">
        ${result}
    </div>

</div>
`;

        const formattedResult = result

            // bold text
            .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")

            // ### heading convert
            .replace(/### (.*?)(\n|$)/g,
                "<h3>$1</h3>")

            // line breaks
            .replace(/\n/g, "<br>");

        document.getElementById("aiResult").innerHTML =
            formattedResult;
    }




    async function loadUser() {
        const user = await supabaseClient.auth.getUser();

        if (!user.data.user) {
            window.location.href = "login.html";
            return;
        }

        const username = user.data.user.user_metadata.display_name;
        // const username = user.data.user.email;
        const h1 = document.querySelector("h1")
        h1.innerText = `Welcome, ${username}`;

    }

    loadUser();

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.href = "index.html";
    }

    function printReport() {
        window.print();
    }
</script>

</html>
