        .navbar {

            top: 0;

    <form>
        <div class="container">

            <h2>Welcome Back</h2>
            <p>Login to your account</p>

            <label for="email">Email</label>
            <input type="email" placeholder="Enter your email" id="email" required>

            <label for="password">Password</label>
            <input type="password" placeholder="Enter your password" id="password" required>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const supabaseClient = window.supabase.createClient(
            "https://hhtbahmaencprbwkukrq.supabase.co",             //this is url address of our supabase 
            "sb_publishable_zSrh_i_5c8tISKvR-kkMvQ_FUeKzrXR"        //this is key help to authenticate,database,backend and frontend
        );

        const form = document.querySelector("form");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const res = await supabaseClient.auth.signInWithPassword({
                email,
                password
            });

            if (res.error) {
                alert(res.error.message);
                return;
            }

            // alert("Login successful ✅");

            // पुढे redirect (example)
            window.location.href = "dashboard.html";
        });



    </script>

    <script>

      if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark");
}

function toggleTheme(){

    document.body.classList.toggle("dark");

    if(document.body.classList.contains("dark")){
        localStorage.setItem("theme","dark");
    }
    else{
        localStorage.setItem("theme","light");
    }
}

    </script>
